<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart PDF Summarizer — View Document</title>
<meta name="description" content="View AI-generated study notes, key points, and flashcards."/>
<link rel="stylesheet" href="css/style.css"/>
<script type="importmap">
{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
</script>
</head>
<body>
<div class="control-bar">
  <button class="toggle-pill font-size-btn" id="font-size-btn" aria-label="Adjust font size" title="Font size"></button>
  <button class="toggle-pill" id="theme-toggle" aria-label="Toggle theme">
    <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg id="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
  <button class="toggle-pill" id="lang-toggle"></button>
</div>

<div class="wrap">
  <div class="top-bar">
    <a href="library.html" class="btn btn-ghost" style="padding:8px 14px;font-size:.82rem">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      <span data-i18n="backToLibrary">Back to Library</span>
    </a>
    <div class="user-info">
      <span class="user-email" id="user-email"></span>
      <button class="btn btn-danger" style="padding:6px 14px;font-size:.78rem" id="logout-btn" data-i18n="logOut">Log out</button>
    </div>
  </div>

  <div class="card" id="loading-state" style="text-align:center;padding:40px;color:var(--muted)">
    <div class="spinner" style="margin:0 auto 10px"></div><span data-i18n="loading">Loading…</span>
  </div>

  <div id="err-box"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span id="err-text"></span></div>

  <div id="results" style="display:none">
    <div class="res-head">
      <div class="res-title"><div class="dot-ok"></div><span id="view-filename">Document</span><span class="provider-badge" id="result-badge">Claude</span></div>
      <a href="upload.html" class="btn btn-accent" style="padding:8px 16px;font-size:.84rem" data-i18n="newPDF">New PDF</a>
    </div>
    <div class="stats" id="stats"></div>
    <div class="tabs">
      <button class="tab on" data-panel="summary"><span data-i18n="summary">Summary</span></button>
      <button class="tab" data-panel="keypoints"><span data-i18n="keyPoints">Key Points</span></button>
      <button class="tab" data-panel="flashcards"><span data-i18n="flashcards">Flashcards</span></button>
    </div>
    <div class="panel on" id="p-summary"><div class="md" id="c-summary"></div></div>
    <div class="panel" id="p-keypoints"><div class="md" id="c-keypoints"></div></div>
    <div class="panel" id="p-flashcards">
      <p style="font-size:.83rem;color:var(--muted);margin-bottom:14px;font-style:italic" data-i18n="tapToFlip">Tap a card to reveal the answer</p>
      <div class="fc-grid" id="c-flashcards"></div>
    </div>
  </div>
  <footer data-i18n="footer">Built with ❤️ · Powered by Supabase + AI</footer>
</div>

<script type="module">
import { createClient } from '@supabase/supabase-js';
import { t, getLang, setLang } from './js/i18n.js';
import { initFontSize, cycleFontSize } from './js/font-size.js';

const sb = createClient(
  'https://efkraurkqiavqdilkjpt.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVma3JhdXJrcWlhdnFkaWxranB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzUzMjgsImV4cCI6MjA5NzAxMTMyOH0.ElPgpRN-ubpg93nMFSUmHUAukyw5bWL2GvtLv4Wddyg'
);

const { data: { session } } = await sb.auth.getSession();
if (!session) window.location.href = 'index.html';
const { data: { user } } = await sb.auth.getUser();
if (user) document.getElementById('user-email').textContent = user.email;
document.getElementById('logout-btn').addEventListener('click', async () => { await sb.auth.signOut(); window.location.href = 'index.html'; });

const docId = new URLSearchParams(window.location.search).get('id');
if (!docId) { window.location.href = 'library.html'; }

// Font size
initFontSize();
document.getElementById("font-size-btn").addEventListener("click", cycleFontSize);

// Theme
const body = document.body;
const savedTheme = localStorage.getItem('theme') || 'light';
body.setAttribute('data-theme', savedTheme);
updateThemeUI(savedTheme);
document.getElementById('theme-toggle').addEventListener('click', () => {
  const n = (body.getAttribute('data-theme')||'light') === 'light' ? 'dark' : 'light';
  body.setAttribute('data-theme', n); localStorage.setItem('theme', n); updateThemeUI(n);
});
function updateThemeUI(th) { document.getElementById('theme-icon-dark').style.display = th === 'dark' ? '' : 'none'; document.getElementById('theme-icon-light').style.display = th === 'light' ? '' : 'none'; }

// Language
const langBtn = document.getElementById('lang-toggle');
updateLangUI();
langBtn.addEventListener('click', () => { setLang(getLang()==='en'?'mm':'en'); updateLangUI(); renderTexts(); });
function updateLangUI() { langBtn.textContent = getLang()==='en'?'မြန်မာ':'EN'; document.documentElement.lang = getLang()==='mm'?'my':'en'; }
function renderTexts() { document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n')); }); document.title = t('appName'); }
renderTexts();

function showErr(msg) { document.getElementById('err-box').classList.add('show'); document.getElementById('err-text').textContent = msg; }
function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(iso) { if (!iso) return ''; const d = new Date(iso); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function md2html(md) {
  if (!md) return '';
  let s = md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/^---$/gm,'<hr/>').replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>').replace(/^[-•] (.+)$/gm,'<li>$1</li>');
  s = s.replace(/(<li>[^]*?<\/li>\n?)+/g, m => '<ul>'+m+'</ul>');
  return s.split(/\n{2,}/).map(b => { b=b.trim(); if(!b) return ''; if(/^<(h[23]|ul|hr|blockquote)/.test(b)) return b; return '<p>'+b.replace(/\n/g,'<br/>')+'</p>'; }).join('');
}

const loadingEl = document.getElementById('loading-state'), resultsEl = document.getElementById('results');
const { data: doc, error } = await sb.from('documents').select('*').eq('id', docId).single();
loadingEl.style.display='none';

if (error || !doc) { showErr(t('documentNotFound')); }
else if (doc.status === 'error') { showErr(doc.error_msg || t('somethingWentWrong')); }
else if (doc.status !== 'done') { showErr(t('stillProcessing')); }
else {
  resultsEl.style.display='block';
  document.getElementById('view-filename').textContent = doc.filename;
  document.getElementById('result-badge').textContent = doc.provider==='gemini'?'Gemini':'Claude';

  let st = '';
  if (doc.page_count) st += `<div class="stat">${t('pages')}: <strong>${doc.page_count}</strong></div>`;
  if (doc.word_count) st += `<div class="stat">${t('words')}: <strong>${doc.word_count.toLocaleString()}</strong></div>`;
  if (doc.flashcard_count) st += `<div class="stat">${t('flashcards')}: <strong>${doc.flashcard_count}</strong></div>`;
  st += `<div class="stat">${t('date')}: <strong>${fmtDate(doc.created_at)}</strong></div>`;
  document.getElementById('stats').innerHTML = st;

  const prefix = `${doc.user_id}/${docId}/`;
  const [sRes,kRes,fRes] = await Promise.all([
    sb.storage.from('outputs').download(prefix+'summary.md'),
    sb.storage.from('outputs').download(prefix+'key_points.md'),
    sb.storage.from('outputs').download(prefix+'flashcards.md'),
  ]);
  if (sRes.data) { const tx = await sRes.data.text(); document.getElementById('c-summary').innerHTML = md2html(tx.replace(/^# .*\n/,'').replace(/---[\s\S]*$/,'')); }
  if (kRes.data) { const tx = await kRes.data.text(); document.getElementById('c-keypoints').innerHTML = md2html(tx.replace(/^# .*\n/,'').replace(/---[\s\S]*$/,'')); }
  if (fRes.data) {
    const tx = await fRes.data.text(); const cards = []; let cur = null;
    for (const line of tx.split('\n')) {
      const qm=line.match(/^\*\*Q:\*\*\s+(.+)/), am=line.match(/^\*\*A:\*\*\s+(.+)/);
      if (qm) { cur={q:qm[1],a:''}; } else if (am&&cur) { cur.a=am[1]; cards.push(cur); cur=null; }
    }
    const hint=t('clickToFlip'), lbl=t('card');
    document.getElementById('c-flashcards').innerHTML = cards.map((fc,i)=>`<div class="fc" onclick="this.classList.toggle('flip')"><div class="lbl">${lbl} ${i+1}</div><div class="q">${esc(fc.q)}</div><div class="a">${esc(fc.a)}</div><div class="fc-hint">${hint}</div></div>`).join('');
  }
}
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
    tab.classList.add('on'); document.getElementById('p-'+tab.dataset.panel).classList.add('on');
  });
});
</script>
</body>
</html>
