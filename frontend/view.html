<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script>
  // Prevent flash of wrong theme — must run before first paint
  (function(){try{var t=localStorage.getItem('theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)}catch(e){}})();
</script>
<title>Smart PDF Summarizer — View Document</title>
<meta name="description" content="View AI-generated study notes, key points, and flashcards."/>
<link rel="stylesheet" href="css/style.css?v=2"/>
<script type="importmap">
{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
</script>
</head>
<body>
<div class="control-bar" id="control-bar-target"></div>

<div class="wrap">
  <div class="top-bar">
    <a href="library.html" class="btn btn-ghost btn-sm">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      <span data-i18n="backToLibrary">Back to Library</span>
    </a>
    <div class="user-info">
      <span class="user-email" id="user-email"></span>
      <button class="btn btn-danger btn-xs" id="logout-btn" data-i18n="logOut">Log out</button>
    </div>
  </div>

  <div id="loading-state">
    <div class="skeleton-card">
      <div class="skeleton skeleton-line w-60 title"></div>
      <div class="res-actions skeleton-pills"><div class="skeleton skeleton-pill"></div><div class="skeleton skeleton-pill"></div><div class="skeleton skeleton-pill"></div></div>
      <div class="skeleton skeleton-line w-80"></div>
      <div class="skeleton skeleton-line w-60"></div>
      <div class="skeleton skeleton-line w-80"></div>
      <div class="skeleton skeleton-line w-40"></div>
    </div>
  </div>

  <div id="err-box" role="alert" aria-live="polite"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span id="err-text"></span></div>

  <div id="results">
    <div class="res-head">
      <div class="res-title"><div class="dot-ok"></div><span id="view-filename">Document</span><span class="provider-badge" id="result-badge">Claude</span></div>
      <a href="upload.html" class="btn btn-accent btn-sm" data-i18n="newPDF">New PDF</a>
    </div>
    <div class="stats" id="stats"></div>
    <div class="tabs">
      <button class="tab on" data-panel="summary"><span data-i18n="summary">Summary</span></button>
      <button class="tab" data-panel="keypoints"><span data-i18n="keyPoints">Key Points</span></button>
      <button class="tab" data-panel="flashcards"><span data-i18n="flashcards">Flashcards</span></button>
    </div>
    <div class="panel on" id="p-summary"><div class="md" id="c-summary"></div></div>
    <div class="panel" id="p-keypoints"><div class="md" id="c-keypoints"></div></div>
    <div class="panel" id="p-flashcards">
      <p class="fc-hint-text" data-i18n="tapToFlip">Tap a card to reveal the answer</p>
      <div class="fc-grid" id="c-flashcards"></div>
    </div>
  </div>
  <footer data-i18n="footer">Built with ❤️ · Powered by Supabase + AI</footer>
</div>

<script type="module">
import { sb } from './js/supabase-client.js';
import { t } from './js/i18n.js';
import { initUI, renderI18n, initTabs, switchTab } from './js/ui-init.js';
import { esc, md2html, fmtDate, parseFlashcards, renderFlashcards } from './js/app.js';
import { injectControlBar } from './js/shared-ui.js';
injectControlBar();

let session, user;
try {
  const sessResp = await sb.auth.getSession();
  session = sessResp.data?.session;
  const userResp = await sb.auth.getUser();
  user = userResp.data?.user;
} catch {
  session = null;
  user = null;
}
if (!session) window.location.href = 'index.html';
if (user) document.getElementById('user-email').textContent = user.email;
document.getElementById('logout-btn').addEventListener('click', async () => { await sb.auth.signOut(); window.location.href = 'index.html'; });

const docId = new URLSearchParams(window.location.search).get('id');
if (!docId) { window.location.href = 'library.html'; }

// Theme, font size, language — shared init
initUI(() => { renderI18n(); document.title = t('appName'); });
renderI18n();
document.title = t('appName');

function showErr(msg) { document.getElementById('err-box').classList.add('show'); document.getElementById('err-text').textContent = msg; }

const loadingEl = document.getElementById('loading-state'), resultsEl = document.getElementById('results');
const { data: doc, error } = await sb.from('documents').select('*').eq('id', docId).single();
loadingEl.style.display='none';

if (error || !doc) { showErr(t('documentNotFound')); }
else if (doc.status === 'error') { showErr(doc.error_msg || t('somethingWentWrong')); }
else if (doc.status !== 'done') { showErr(t('stillProcessing')); }
else {
  resultsEl.classList.add('show');
  document.getElementById('view-filename').textContent = doc.filename;
  document.getElementById('result-badge').textContent = doc.provider==='gemini'?'Gemini':'Claude';

  let st = '';
  if (doc.page_count) st += `<div class="stat">${t('pages')}: <strong>${doc.page_count}</strong></div>`;
  if (doc.word_count) st += `<div class="stat">${t('words')}: <strong>${doc.word_count.toLocaleString()}</strong></div>`;
  if (doc.flashcard_count) st += `<div class="stat">${t('flashcards')}: <strong>${doc.flashcard_count}</strong></div>`;
  st += `<div class="stat">${t('date')}: <strong>${fmtDate(doc.created_at)}</strong></div>`;
  document.getElementById('stats').innerHTML = st;

  const prefix = `${doc.user_id}/${docId}/`;
  let downloadFailed = false;
  try {
    const [sRes,kRes,fRes] = await Promise.all([
      sb.storage.from('outputs').download(prefix+'summary.md'),
      sb.storage.from('outputs').download(prefix+'key_points.md'),
      sb.storage.from('outputs').download(prefix+'flashcards.md'),
    ]);
    if (sRes.data) { const tx = await sRes.data.text(); document.getElementById('c-summary').innerHTML = md2html(tx.replace(/^# .*\n/,'').replace(/---[\s\S]*$/,'')); }
    else if (sRes.error) { console.error('Failed to load summary:', sRes.error); downloadFailed = true; }
    if (kRes.data) { const tx = await kRes.data.text(); document.getElementById('c-keypoints').innerHTML = md2html(tx.replace(/^# .*\n/,'').replace(/---[\s\S]*$/,'')); }
    else if (kRes.error) { console.error('Failed to load key points:', kRes.error); downloadFailed = true; }
    if (fRes.data) {
      const tx = await fRes.data.text();
      const cards = parseFlashcards(tx);
      renderFlashcards(document.getElementById('c-flashcards'), cards, t);
    } else if (fRes.error) { console.error('Failed to load flashcards:', fRes.error); downloadFailed = true; }
  } catch {
    downloadFailed = true;
    console.error('Failed to download output files');
  }
  if (downloadFailed) { showErr(t('networkError')); }
}
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab));
});
initTabs();
</script>
</body>
</html>
