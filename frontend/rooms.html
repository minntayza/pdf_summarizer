<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script>
  (function(){try{var t=localStorage.getItem('theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)}catch(e){}})();
</script>
<title>Smart PDF Summarizer — Study Rooms</title>
<link rel="stylesheet" href="css/style.css?v=3"/>
<script type="importmap">
{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
</script>
</head>
<body>
<div class="control-bar" id="control-bar-target"></div>

<div class="wrap">
  <div class="top-bar">
    <a href="library.html" class="btn btn-ghost btn-sm">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      <span data-i18n="backToLibrary">Back to Library</span>
    </a>
    <div class="user-info">
      <span class="user-email" id="user-email"></span>
      <button class="btn btn-danger btn-xs" id="logout-btn" data-i18n="logOut">Log out</button>
    </div>
  </div>

  <header>
    <div class="logo logo-sm"><span class="logo-accent" data-i18n="studyRooms">Study Rooms</span></div>
    <p class="subtitle">Collaborate and share study materials with your classmates.</p>
  </header>

  <div style="display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap">
    <button class="btn btn-accent" id="create-room-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span data-i18n="createRoom">Create Room</span>
    </button>
    <button class="btn btn-ghost" id="join-room-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      <span data-i18n="joinRoom">Join Room</span>
    </button>
  </div>

  <!-- Create room modal -->
  <div class="card" id="create-form" style="display:none">
    <h3 data-i18n="createRoom" style="margin-bottom:14px;font-family:var(--font-heading)">Create Room</h3>
    <div class="form-row-center">
      <div class="form-flex-1">
        <label class="provider-label" data-i18n="roomName">Room Name</label>
        <input type="text" id="room-name-input" placeholder="e.g. CS301 Study Group" class="form-input"/>
      </div>
      <button class="btn btn-accent" id="confirm-create-btn">Create</button>
      <button class="btn btn-ghost" id="cancel-create-btn">Cancel</button>
    </div>
  </div>

  <!-- Join room modal -->
  <div class="card" id="join-form" style="display:none">
    <h3 data-i18n="joinRoom" style="margin-bottom:14px;font-family:var(--font-heading)">Join Room</h3>
    <div class="form-row-center">
      <div class="form-flex-1">
        <label class="provider-label" data-i18n="inviteCode">Invite Code</label>
        <input type="text" id="invite-code-input" placeholder="Enter invite code" class="form-input"/>
      </div>
      <button class="btn btn-accent" id="confirm-join-btn">Join</button>
      <button class="btn btn-ghost" id="cancel-join-btn">Cancel</button>
    </div>
  </div>

  <div class="room-list" id="room-list"></div>

  <div class="empty-state" id="empty-state" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
    <h3 data-i18n="noRooms">No study rooms yet</h3>
    <p data-i18n="noRoomsHint">Create a room or join one with an invite code.</p>
  </div>

  <footer data-i18n="footer">Built with ❤️ · Powered by Supabase + AI</footer>
</div>

<script type="module">
import { sb } from './js/supabase-client.js';
import { t } from './js/i18n.js';
import { renderI18n } from './js/ui-init.js';
import { esc } from './js/app.js';
import { toast } from './js/toast.js';
import { confirm } from './js/confirm.js';
import { getRooms, createRoom, joinRoom } from './js/rooms.js';
import { initPage } from './js/page-init.js';

await initPage({ onLangChange: () => { renderI18n(); document.title = t('appName') + ' — ' + t('studyRooms'); } });
document.title = t('appName') + ' — ' + t('studyRooms');

const listEl = document.getElementById('room-list');
const emptyEl = document.getElementById('empty-state');
const createForm = document.getElementById('create-form');
const joinForm = document.getElementById('join-form');

// Toggle forms
document.getElementById('create-room-btn').addEventListener('click', () => {
  createForm.style.display = createForm.style.display === 'none' ? 'block' : 'none';
  joinForm.style.display = 'none';
});
document.getElementById('join-room-btn').addEventListener('click', () => {
  joinForm.style.display = joinForm.style.display === 'none' ? 'block' : 'none';
  createForm.style.display = 'none';
});
document.getElementById('cancel-create-btn').addEventListener('click', () => createForm.style.display = 'none');
document.getElementById('cancel-join-btn').addEventListener('click', () => joinForm.style.display = 'none');

// Create room
document.getElementById('confirm-create-btn').addEventListener('click', async () => {
  const name = document.getElementById('room-name-input').value.trim();
  if (!name) return toast('Please enter a room name.', 'error');
  const { data, error } = await createRoom(name);
  if (error) return toast('Failed to create room.', 'error');
  toast('Room created!', 'success');
  createForm.style.display = 'none';
  document.getElementById('room-name-input').value = '';
  await loadRooms();
});

// Join room
document.getElementById('confirm-join-btn').addEventListener('click', async () => {
  const code = document.getElementById('invite-code-input').value.trim();
  if (!code) return toast('Please enter an invite code.', 'error');
  const { data, error, alreadyMember } = await joinRoom(code);
  if (error) return toast(t('roomNotFound'), 'error');
  if (alreadyMember) return toast(t('alreadyMember'), 'info');
  toast(t('joinedRoom'), 'success');
  joinForm.style.display = 'none';
  document.getElementById('invite-code-input').value = '';
  await loadRooms();
});

async function loadRooms() {
  const rooms = await getRooms();
  listEl.innerHTML = '';
  if (rooms.length === 0) {
    emptyEl.hidden = false;
    return;
  }
  emptyEl.hidden = true;

  rooms.forEach(room => {
    const card = document.createElement('div');
    card.className = 'room-card';
    card.innerHTML = `
      <div class="room-name">${esc(room.name)}</div>
      <div class="room-meta">${t('roomInviteCode')}: <strong>${esc(room.invite_code)}</strong></div>
    `;
    card.addEventListener('click', () => { window.location.href = 'room.html?id=' + room.id; });
    listEl.appendChild(card);
  });
}

await loadRooms();
</script>
</body>
</html>
