<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart PDF Summarizer — Login</title>
<meta name="description" content="Log in to Smart PDF Lecture Summarizer."/>
<link rel="stylesheet" href="css/style.css"/>
<script type="importmap">
{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
</script>
</head>
<body>
<div class="control-bar">
  <button class="toggle-pill font-size-btn" id="font-size-btn" aria-label="Adjust font size" title="Font size"></button>
  <button class="toggle-pill" id="theme-toggle" aria-label="Toggle theme">
    <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg id="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
  <button class="toggle-pill" id="lang-toggle"></button>
</div>

<div class="wrap">
  <header>
    <div class="logo">Smart <span class="logo-accent">PDF</span> Summarizer</div>
    <p class="subtitle" data-i18n="appTagline">Transform lecture PDFs into study notes, key points &amp; flashcards with AI.</p>
  </header>

  <div class="card">
    <form id="login-form" autocomplete="on" novalidate>
      <div class="field">
        <label for="email" data-i18n="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required/>
      </div>
      <div class="field">
        <label for="password" data-i18n="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" autocomplete="current-password" required/>
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div id="form-error" class="field-error" style="margin-bottom:12px"></div>
      <button type="submit" class="btn btn-primary btn-full" id="submit-btn" data-i18n="logIn">Log In</button>
    </form>
  </div>
  <p class="auth-switch"><span data-i18n="noAccount">Don't have an account?</span> <a href="signup.html" class="link" data-i18n="signUpLink">Sign up</a></p>
  <footer data-i18n="footer">Built with ❤️ · Powered by Supabase + AI</footer>
</div>

<script type="module">
import { createClient } from '@supabase/supabase-js';
import { t, getLang, setLang } from './js/i18n.js';
import { initFontSize, cycleFontSize } from './js/font-size.js';

const sb = createClient(
  'https://efkraurkqiavqdilkjpt.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVma3JhdXJrcWlhdnFkaWxranB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzUzMjgsImV4cCI6MjA5NzAxMTMyOH0.ElPgpRN-ubpg93nMFSUmHUAukyw5bWL2GvtLv4Wddyg'
);

const { data: { session } } = await sb.auth.getSession();
if (session) window.location.href = 'upload.html';

// Font size
initFontSize();
document.getElementById('font-size-btn').addEventListener('click', cycleFontSize);

// Theme (default: light for classical feel)
const body = document.body;
const savedTheme = localStorage.getItem('theme') || 'light';
body.setAttribute('data-theme', savedTheme);
updateThemeUI(savedTheme);

document.getElementById('theme-toggle').addEventListener('click', () => {
  const cur = body.getAttribute('data-theme') || 'light';
  const next = cur === 'light' ? 'dark' : 'light';
  body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeUI(next);
});

function updateThemeUI(theme) {
  document.getElementById('theme-icon-dark').style.display = theme === 'dark' ? '' : 'none';
  document.getElementById('theme-icon-light').style.display = theme === 'light' ? '' : 'none';
}

// Language
const langBtn = document.getElementById('lang-toggle');
updateLangUI();
langBtn.addEventListener('click', () => { setLang(getLang() === 'en' ? 'mm' : 'en'); updateLangUI(); renderTexts(); updatePlaceholders(); });
function updateLangUI() { langBtn.textContent = getLang() === 'en' ? 'မြန်မာ' : 'EN'; document.documentElement.lang = getLang() === 'mm' ? 'my' : 'en'; }

function renderTexts() {
  document.querySelectorAll('[data-i18n]').forEach(el => { if (el.tagName !== 'INPUT' || el.type !== 'submit') el.textContent = t(el.getAttribute('data-i18n')); });
  document.getElementById('submit-btn').textContent = t('logIn');
  document.title = t('appName') + ' — ' + t('loginTitle');
}
function updatePlaceholders() {
  document.getElementById('email').placeholder = t('emailPlaceholder');
  document.getElementById('password').placeholder = t('passwordPlaceholder');
}
renderTexts(); updatePlaceholders();

// Login
const form = document.getElementById('login-form');
const emailInput = document.getElementById('email');
const pwInput = document.getElementById('password');
const submitBtn = document.getElementById('submit-btn');
const formErr = document.getElementById('form-error');
const pwToggle = document.getElementById('pw-toggle');

pwToggle.addEventListener('click', () => {
  const isPw = pwInput.type === 'password';
  pwInput.type = isPw ? 'text' : 'password';
  pwToggle.innerHTML = isPw
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  formErr.classList.remove('show');
  const email = emailInput.value.trim(), pw = pwInput.value;
  if (!email) { formErr.textContent = t('pleaseEnterEmail'); formErr.classList.add('show'); return; }
  if (!pw) { formErr.textContent = t('pleaseEnterPassword'); formErr.classList.add('show'); return; }
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<div class="spinner"></div> ' + t('loggingIn');
  try {
    const { error } = await sb.auth.signInWithPassword({ email, password: pw });
    if (error) throw error;
    window.location.href = 'upload.html';
  } catch (err) {
    formErr.textContent = err.message || t('invalidEmailOrPassword');
    formErr.classList.add('show');
    submitBtn.disabled = false;
    submitBtn.textContent = t('logIn');
  }
});
</script>
</body>
</html>
