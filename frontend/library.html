<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script>
  // Prevent flash of wrong theme — must run before first paint
  (function(){try{var t=localStorage.getItem('theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)}catch(e){}})();
</script>
<title>Smart PDF Summarizer — Library</title>
<meta name="description" content="Your saved lecture summaries and flashcards."/>
<link rel="stylesheet" href="css/style.css?v=4"/>
<script type="importmap">
{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
</script>
</head>
<body>
<div class="control-bar" id="control-bar-target"></div>

<div class="wrap">
  <div class="top-bar">
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <a href="upload.html" class="btn btn-accent btn-sm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span data-i18n="uploadNewPDF">Upload New PDF</span>
      </a>
      <a href="subjects.html" class="btn btn-ghost btn-sm" data-i18n="subjects">Subjects</a>
      <a href="rooms.html" class="btn btn-ghost btn-sm" data-i18n="studyRooms">Study Rooms</a>
    </div>
    <div class="user-info">
      <span class="user-email" id="user-email"></span>
      <button class="btn btn-danger btn-xs" id="logout-btn" data-i18n="logOut">Log out</button>
    </div>
  </div>

  <header>
    <div class="logo logo-sm">Your <span class="logo-accent">Library</span></div>
    <p class="subtitle" data-i18n="libraryTagline">All your processed lecture PDFs and their study materials.</p>
  </header>

  <div id="err-box" role="alert" aria-live="polite"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span id="err-text"></span></div>

  <div class="search-bar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" class="search-input" id="search-input" data-i18n-placeholder="searchDocs" placeholder="Search your documents…" autocomplete="off"/>
    <button class="search-clear" id="search-clear" title="Clear search" hidden aria-label="Clear search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="subject-filter" id="subject-filter"></div>
  <div class="doc-list" id="doc-list"></div>

  <div class="empty-state" id="empty-state" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    <h3 data-i18n="noDocuments">No documents yet</h3>
    <p data-i18n="noDocumentsHint">Upload your first lecture PDF to get started.</p>
    <a href="upload.html" class="btn btn-accent" data-i18n="uploadNewPDF">Upload PDF</a>
  </div>

  <div id="loading-state">
    <div class="skeleton-card"><div class="skeleton-row"><div class="skeleton skeleton-icon"></div><div class="skeleton-body"><div class="skeleton skeleton-line w-80"></div><div class="skeleton skeleton-line w-40 h-8"></div></div><div class="skeleton skeleton-pill"></div></div></div>
    <div class="skeleton-card"><div class="skeleton-row"><div class="skeleton skeleton-icon"></div><div class="skeleton-body"><div class="skeleton skeleton-line w-60"></div><div class="skeleton skeleton-line w-40 h-8"></div></div><div class="skeleton skeleton-pill"></div></div></div>
    <div class="skeleton-card"><div class="skeleton-row"><div class="skeleton skeleton-icon"></div><div class="skeleton-body"><div class="skeleton skeleton-line w-80"></div><div class="skeleton skeleton-line w-40 h-8"></div></div><div class="skeleton skeleton-pill"></div></div></div>
  </div>

  <footer data-i18n="footer">Built with ❤️ · Powered by Supabase + AI</footer>
</div>

<script type="module">
import { sb } from './js/supabase-client.js';
import { t } from './js/i18n.js';
import { renderI18n } from './js/ui-init.js';
import { esc, fmtDate, renderDocList } from './js/app.js';
import { toast } from './js/toast.js';
import { confirm } from './js/confirm.js';
import { getSubjects } from './js/subjects.js';
import { initPage } from './js/page-init.js';

await initPage({
  onLangChange: () => { renderI18n(); loadDocs(); document.title = t('appName') + ' — ' + t('libraryTitle'); }
});

const listEl = document.getElementById('doc-list'), loadingEl = document.getElementById('loading-state'), emptyEl = document.getElementById('empty-state');
const filterEl = document.getElementById('subject-filter');
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');

let currentDocs = [];
let allDocs = [];
let subjects = [];
let activeSubjectId = null;
let searchQuery = '';
let searchTimeout = null;

async function loadSubjects() {
  subjects = await getSubjects();
  renderSubjectFilter();
}

function renderSubjectFilter() {
  filterEl.innerHTML = '';
  const allPill = document.createElement('button');
  allPill.className = 'subject-pill' + (activeSubjectId === null ? ' active' : '');
  allPill.textContent = t('allSubjects');
  allPill.addEventListener('click', () => { activeSubjectId = null; renderSubjectFilter(); filterDocs(); });
  filterEl.appendChild(allPill);

  subjects.forEach(s => {
    const pill = document.createElement('button');
    pill.className = 'subject-pill' + (activeSubjectId === s.id ? ' active' : '');
    pill.style.setProperty('--pill-color', s.color);
    pill.innerHTML = `<span class="subject-dot" style="background:${s.color}"></span> ${esc(s.name)}`;
    pill.addEventListener('click', () => { activeSubjectId = s.id; renderSubjectFilter(); filterDocs(); });
    filterEl.appendChild(pill);
  });
}

function applySubjectFilter(docs) {
  if (activeSubjectId !== null) return docs.filter(d => d.subject_id === activeSubjectId);
  return docs;
}

async function filterDocs() {
  if (!searchQuery) {
    // No search — use in-memory data with subject filter only
    currentDocs = applySubjectFilter(allDocs);
    renderDocs(currentDocs);
    return;
  }

  // Server-side full-text search via PostgreSQL tsvector
  let query = sb.from('documents')
    .select('id,filename,provider,status,progress,progress_msg,pdf_path,output_prefix,error_msg,page_count,word_count,flashcard_count,quiz_count,language,subject_id,user_id,created_at,subjects(name,color)')
    .textSearch('search_vector', searchQuery, { type: 'websearch', config: 'english' });

  if (activeSubjectId !== null) {
    query = query.eq('subject_id', activeSubjectId);
  }

  const { data, error } = await query.order('created_at', { ascending: false });
  if (error) {
    console.error('FTS query failed, falling back to client-side:', error);
    // Fallback to client-side filter
    const q = searchQuery.toLowerCase();
    currentDocs = applySubjectFilter(allDocs).filter(d =>
      d.filename.toLowerCase().includes(q) ||
      (d.subjects?.name || '').toLowerCase().includes(q)
    );
  } else {
    currentDocs = data || [];
  }
  renderDocs(currentDocs);
}

// Wire search (debounced for server-side FTS)
if (searchInput) {
  searchInput.addEventListener('input', () => {
    searchQuery = searchInput.value.trim();
    if (searchClear) searchClear.hidden = !searchQuery;
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => filterDocs(), searchQuery ? 300 : 0);
  });
}
if (searchClear) {
  searchClear.addEventListener('click', () => {
    if (searchInput) searchInput.value = '';
    searchQuery = '';
    searchClear.hidden = true;
    clearTimeout(searchTimeout);
    filterDocs();
    if (searchInput) searchInput.focus();
  });
}

async function deleteDoc(doc, docEl) {
  const ok = await confirm('Delete "' + doc.filename + '" and all its study materials?');
  if (!ok) return;

  docEl.style.opacity = '0.4';
  docEl.style.pointerEvents = 'none';

  const prefix = doc.user_id + '/' + doc.id + '/';
  try { await sb.storage.from('outputs').remove([prefix+'summary.md',prefix+'key_points.md',prefix+'flashcards.md',prefix+'quiz.md']); } catch (e) { console.warn('Storage outputs cleanup:', e); }
  const pdfPath = doc.pdf_path ? doc.pdf_path.replace('pdfs/', '') : doc.user_id + '/' + doc.id + '.pdf';
  try { await sb.storage.from('pdfs').remove([pdfPath]); } catch (e) { console.warn('Storage pdf cleanup:', e); }

  try {
    const { error } = await sb.from('documents').delete().eq('id', doc.id);
    if (error) throw error;

    docEl.style.transition = 'opacity .25s ease, transform .25s ease';
    docEl.style.transform = 'translateX(20px)';
    docEl.style.opacity = '0';
    setTimeout(() => {
      docEl.remove();
      if (listEl.children.length === 0) {
        emptyEl.hidden = false;
      }
    }, 300);

    toast('Deleted: ' + doc.filename, 'success');
  } catch (err) {
    console.error('Delete failed:', err);
    docEl.style.opacity = '1';
    docEl.style.pointerEvents = '';
    toast('Failed to delete. Try again.', 'error');
  }
}
function startDocRename(nameEl, doc) {
  const original = nameEl.textContent;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = original;
  input.className = 'doc-name-input';
  input.style.cssText = 'background:var(--bg);border:1px solid var(--gold);border-radius:var(--rs);padding:2px 6px;color:var(--text);font-family:var(--font-body);font-size:.88rem;width:100%;max-width:260px;outline:none;';
  nameEl.innerHTML = '';
  nameEl.appendChild(input);
  input.focus();
  input.select();

  const commit = async () => {
    const v = input.value.trim();
    if (!v || v === original) {
      nameEl.textContent = original;
      return;
    }
    const newName = v.endsWith('.pdf') ? v : v + '.pdf';
    const { error } = await sb.from('documents').update({ filename: newName }).eq('id', doc.id);
    if (error) {
      nameEl.textContent = original;
      toast('Rename failed', 'error');
      return;
    }
    nameEl.textContent = newName;
    toast('Renamed to ' + newName, 'success');
  };

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { nameEl.textContent = original; }
  });
}

async function loadDocs() {
  try {
    const { data: docs, error } = await sb.from('documents').select('id,filename,provider,status,progress,progress_msg,pdf_path,output_prefix,error_msg,page_count,word_count,flashcard_count,quiz_count,language,subject_id,user_id,created_at,subjects(name,color)').order('created_at',{ascending:false});
    allDocs = docs || [];
    loadingEl.style.display='none';
    if (error) { toast(t('somethingWentWrong'), 'error'); return; }
    if (!docs || docs.length===0) { emptyEl.hidden = false; return; }
    emptyEl.hidden = true;
    await loadSubjects();
    filterDocs();
  } catch (err) {
    console.error('Failed to load documents:', err);
    toast(t('networkError'), 'error');
    loadingEl.style.display = 'none';
  }
}

function renderDocs(docs) {
    listEl.innerHTML = '';
    if (docs.length === 0) {
      emptyEl.hidden = false;
      return;
    }
    emptyEl.hidden = true;

    const docItems = docs.map(doc => {
      const done=doc.status==='done', proc=doc.status==='processing';
      const cls=done?'done':(proc?'processing':'error');
      const label=done?t('done'):(proc?t('processing'):t('error'));
      const icon=done
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'
        : proc
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
      const meta=[doc.page_count?doc.page_count+' '+t('pages'):'', doc.word_count?doc.word_count.toLocaleString()+' '+t('words'):'', doc.flashcard_count?doc.flashcard_count+' '+t('flashcards'):'', doc.provider==='gemini'?'Gemini':'Claude'].filter(Boolean).join(' · ');
      const subjectBadge = doc.subjects ? `<span class="subject-badge" style="color:${doc.subjects.color};border-color:${doc.subjects.color}40;background:${doc.subjects.color}10"><span class="subject-dot" style="background:${doc.subjects.color}"></span>${esc(doc.subjects.name)}</span>` : '';
      const html = `<div class="doc-icon ${done?'done':(proc?'proc':'')}">${icon}</div>
      <div class="doc-info"><span class="doc-name" data-doc-id="${doc.id}" title="Click to rename">${esc(doc.filename)}</span><div class="doc-meta">${meta||fmtDate(doc.created_at)} ${subjectBadge}</div></div>
      <div class="doc-status ${cls}">${label}</div>
      ${proc?'<div class="spinner"></div>':''}
      <button class="doc-delete-btn" data-doc-id="${doc.id}" title="Delete" aria-label="Delete ${esc(doc.filename)}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </button>`;
      return { html, doc, done };
    });

    renderDocList(listEl, docItems, ({ doc, done }) => {
      if (done) window.location.href = 'view.html?id=' + doc.id;
    });

  // Wire up delete buttons
  listEl.querySelectorAll('.doc-delete-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      e.preventDefault();
      const docId = btn.dataset.docId;
      const doc = allDocs.find(d => d.id === docId);
      if (doc) deleteDoc(doc, btn.closest('.doc-item'));
    });
  });

  // Wire up rename
  listEl.querySelectorAll('.doc-name').forEach(nameEl => {
    nameEl.addEventListener('click', e => {
      e.stopPropagation();
      e.preventDefault();
      const docId = nameEl.dataset.docId;
      const doc = allDocs.find(d => d.id === docId);
      if (doc) startDocRename(nameEl, doc);
    });
  });
}

function showErr(msg) {
  const errBox = document.getElementById('err-box');
  const errText = document.getElementById('err-text');
  if (errBox && errText) {
    errText.textContent = msg;
    errBox.classList.add('show');
    document.getElementById('loading-state').style.display = 'none';
  }
}

document.title = t('appName') + ' — ' + t('libraryTitle');

await loadDocs();
</script>
</body>
</html>
