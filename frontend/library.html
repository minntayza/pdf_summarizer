<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script>
  // Prevent flash of wrong theme — must run before first paint
  (function(){try{var t=localStorage.getItem('theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)}catch(e){}})();
</script>
<title>Smart PDF Summarizer — Library</title>
<meta name="description" content="Your saved lecture summaries and flashcards."/>
<link rel="stylesheet" href="css/style.css?v=2"/>
<script type="importmap">
{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
</script>
</head>
<body>
<div class="control-bar" id="control-bar-target"></div>

<div class="wrap">
  <div class="top-bar">
    <a href="upload.html" class="btn btn-accent btn-sm">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span data-i18n="uploadNewPDF">Upload New PDF</span>
    </a>
    <div class="user-info">
      <span class="user-email" id="user-email"></span>
      <button class="btn btn-danger btn-xs" id="logout-btn" data-i18n="logOut">Log out</button>
    </div>
  </div>

  <header>
    <div class="logo logo-sm">Your <span class="logo-accent">Library</span></div>
    <p class="subtitle" data-i18n="libraryTagline">All your processed lecture PDFs and their study materials.</p>
  </header>

  <div id="err-box" role="alert" aria-live="polite"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span id="err-text"></span></div>

  <div class="doc-list" id="doc-list"></div>

  <div class="empty-state" id="empty-state" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    <h3 data-i18n="noDocuments">No documents yet</h3>
    <p data-i18n="noDocumentsHint">Upload your first lecture PDF to get started.</p>
    <a href="upload.html" class="btn btn-accent" data-i18n="uploadNewPDF">Upload PDF</a>
  </div>

  <div id="loading-state">
    <div class="skeleton-card"><div class="skeleton-row"><div class="skeleton skeleton-icon"></div><div class="skeleton-body"><div class="skeleton skeleton-line w-80"></div><div class="skeleton skeleton-line w-40 h-8"></div></div><div class="skeleton skeleton-pill"></div></div></div>
    <div class="skeleton-card"><div class="skeleton-row"><div class="skeleton skeleton-icon"></div><div class="skeleton-body"><div class="skeleton skeleton-line w-60"></div><div class="skeleton skeleton-line w-40 h-8"></div></div><div class="skeleton skeleton-pill"></div></div></div>
    <div class="skeleton-card"><div class="skeleton-row"><div class="skeleton skeleton-icon"></div><div class="skeleton-body"><div class="skeleton skeleton-line w-80"></div><div class="skeleton skeleton-line w-40 h-8"></div></div><div class="skeleton skeleton-pill"></div></div></div>
  </div>

  <footer data-i18n="footer">Built with ❤️ · Powered by Supabase + AI</footer>
</div>

<script type="module">
import { sb } from './js/supabase-client.js';
import { t } from './js/i18n.js';
import { initUI, renderI18n } from './js/ui-init.js';
import { esc, fmtDate } from './js/app.js';
import { injectControlBar } from './js/shared-ui.js';
injectControlBar();

let session, user;
try {
  const sessResp = await sb.auth.getSession();
  session = sessResp.data?.session;
  const userResp = await sb.auth.getUser();
  user = userResp.data?.user;
} catch {
  // Supabase unreachable — show error but don't redirect (user may be authenticated)
  session = null;
  user = null;
}
if (!session) { window.location.href = 'index.html'; }
if (user) document.getElementById('user-email').textContent = user.email;
document.getElementById('logout-btn').addEventListener('click', async () => { await sb.auth.signOut(); window.location.href = 'index.html'; });

const listEl = document.getElementById('doc-list'), loadingEl = document.getElementById('loading-state'), emptyEl = document.getElementById('empty-state');

async function loadDocs() {
  try {
    const { data: docs, error } = await sb.from('documents').select('*').order('created_at',{ascending:false});
    loadingEl.style.display='none';
    if (error) { showErr(t('somethingWentWrong')); return; }
    if (!docs || docs.length===0) { emptyEl.hidden = false; return; }
    emptyEl.hidden = true;
    listEl.innerHTML = docs.map(doc => {
    const done=doc.status==='done', proc=doc.status==='processing';
    const cls=done?'done':(proc?'processing':'error');
    const label=done?t('done'):(proc?t('processing'):t('error'));
    const icon=done
      ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'
      : proc
      ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'
      : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
    const meta=[doc.page_count?doc.page_count+' '+t('pages'):'', doc.word_count?doc.word_count.toLocaleString()+' '+t('words'):'', doc.flashcard_count?doc.flashcard_count+' '+t('flashcards'):'', doc.provider==='gemini'?'Gemini':'Claude'].filter(Boolean).join(' · ');
    return `<a href="${done?'view.html?id='+doc.id:'#'}" class="doc-item${done?'':' disabled'}">
      <div class="doc-icon ${done?'done':(proc?'proc':'')}">${icon}</div>
      <div class="doc-info"><div class="doc-name">${esc(doc.filename)}</div><div class="doc-meta">${meta||fmtDate(doc.created_at)}</div></div>
      <div class="doc-status ${cls}">${label}</div>
      ${proc?'<div class="spinner"></div>':''}
    </a>`;
  }).join('');
  } catch {
    showErr(t('networkError'));
  }
}

function showErr(msg) {
  const errBox = document.getElementById('err-box');
  const errText = document.getElementById('err-text');
  if (errBox && errText) {
    errText.textContent = msg;
    errBox.classList.add('show');
    document.getElementById('loading-state').style.display = 'none';
  }
}

initUI(() => { renderI18n(); loadDocs(); document.title = t('appName') + ' — ' + t('libraryTitle'); });
renderI18n();
document.title = t('appName') + ' — ' + t('libraryTitle');

await loadDocs();
</script>
</body>
</html>
