<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart PDF Summarizer — Library</title>
<meta name="description" content="Your saved lecture summaries and flashcards."/>
<link rel="stylesheet" href="css/style.css"/>
<script type="importmap">
{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
</script>
</head>
<body>
<div class="control-bar">
  <button class="toggle-pill font-size-btn" id="font-size-btn" aria-label="Adjust font size" title="Font size"></button>
  <button class="toggle-pill" id="theme-toggle" aria-label="Toggle theme">
    <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg id="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
  <button class="toggle-pill" id="lang-toggle"></button>
</div>

<div class="wrap">
  <div class="top-bar">
    <a href="upload.html" class="btn btn-accent" style="padding:8px 16px;font-size:.84rem">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span data-i18n="uploadNewPDF">Upload New PDF</span>
    </a>
    <div class="user-info">
      <span class="user-email" id="user-email"></span>
      <button class="btn btn-danger" style="padding:6px 14px;font-size:.78rem" id="logout-btn" data-i18n="logOut">Log out</button>
    </div>
  </div>

  <header>
    <div class="logo" style="font-size:clamp(1.6rem,3.5vw,2.2rem)">Your <span class="logo-accent">Library</span></div>
    <p class="subtitle" data-i18n="libraryTagline">All your processed lecture PDFs and their study materials.</p>
  </header>

  <div id="err-box"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span id="err-text"></span></div>

  <div class="doc-list" id="doc-list"></div>

  <div class="empty-state" id="empty-state" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    <h3 data-i18n="noDocuments">No documents yet</h3>
    <p data-i18n="noDocumentsHint">Upload your first lecture PDF to get started.</p>
    <a href="upload.html" class="btn btn-accent" data-i18n="uploadNewPDF">Upload PDF</a>
  </div>

  <div id="loading-state" class="card" style="text-align:center;padding:40px;color:var(--muted)">
    <div class="spinner" style="margin:0 auto 10px"></div><span data-i18n="loadingLibrary">Loading your library…</span>
  </div>

  <footer data-i18n="footer">Built with ❤️ · Powered by Supabase + AI</footer>
</div>

<script type="module">
import { createClient } from '@supabase/supabase-js';
import { t, getLang, setLang } from './js/i18n.js';
import { initFontSize, cycleFontSize } from './js/font-size.js';

const sb = createClient(
  'https://efkraurkqiavqdilkjpt.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVma3JhdXJrcWlhdnFkaWxranB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzUzMjgsImV4cCI6MjA5NzAxMTMyOH0.ElPgpRN-ubpg93nMFSUmHUAukyw5bWL2GvtLv4Wddyg'
);

const { data: { session } } = await sb.auth.getSession();
if (!session) window.location.href = 'index.html';
const { data: { user } } = await sb.auth.getUser();
if (user) document.getElementById('user-email').textContent = user.email;
document.getElementById('logout-btn').addEventListener('click', async () => { await sb.auth.signOut(); window.location.href = 'index.html'; });

// Font size
initFontSize();
document.getElementById("font-size-btn").addEventListener("click", cycleFontSize);

// Theme
const body = document.body;
const savedTheme = localStorage.getItem('theme') || 'light';
body.setAttribute('data-theme', savedTheme);
updateThemeUI(savedTheme);
document.getElementById('theme-toggle').addEventListener('click', () => {
  const n = (body.getAttribute('data-theme')||'light') === 'light' ? 'dark' : 'light';
  body.setAttribute('data-theme', n); localStorage.setItem('theme', n); updateThemeUI(n);
});
function updateThemeUI(th) { document.getElementById('theme-icon-dark').style.display = th === 'dark' ? '' : 'none'; document.getElementById('theme-icon-light').style.display = th === 'light' ? '' : 'none'; }

// Language
const langBtn = document.getElementById('lang-toggle');
updateLangUI();
langBtn.addEventListener('click', () => { setLang(getLang()==='en'?'mm':'en'); updateLangUI(); loadDocs(); renderTexts(); });
function updateLangUI() { langBtn.textContent = getLang()==='en'?'မြန်မာ':'EN'; document.documentElement.lang = getLang()==='mm'?'my':'en'; }
function renderTexts() {
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n')); });
  document.title = t('appName') + ' — ' + t('libraryTitle');
}
renderTexts();

function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(iso) { if (!iso) return ''; const d = new Date(iso); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' at '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }

const listEl = document.getElementById('doc-list'), loadingEl = document.getElementById('loading-state'), emptyEl = document.getElementById('empty-state');

async function loadDocs() {
  const { data: docs, error } = await sb.from('documents').select('*').order('created_at',{ascending:false});
  loadingEl.style.display='none';
  if (error || !docs || docs.length===0) { emptyEl.style.display='block'; return; }
  emptyEl.style.display='none';
  listEl.innerHTML = docs.map(doc => {
    const done=doc.status==='done', proc=doc.status==='processing';
    const cls=done?'done':(proc?'processing':'error');
    const label=done?t('done'):(proc?t('processing'):t('error'));
    const icon=done
      ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'
      : proc
      ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'
      : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
    const meta=[doc.page_count?doc.page_count+' '+t('pages'):'', doc.word_count?doc.word_count.toLocaleString()+' '+t('words'):'', doc.flashcard_count?doc.flashcard_count+' '+t('flashcards'):'', doc.provider==='gemini'?'Gemini':'Claude'].filter(Boolean).join(' · ');
    return `<a href="${done?'view.html?id='+doc.id:'#'}" class="doc-item" ${!done?'style="pointer-events:none"':''}>
      <div class="doc-icon ${done?'done':(proc?'proc':'')}">${icon}</div>
      <div class="doc-info"><div class="doc-name">${esc(doc.filename)}</div><div class="doc-meta">${meta||fmtDate(doc.created_at)}</div></div>
      <div class="doc-status ${cls}">${label}</div>
      ${proc?'<div class="spinner" style="flex-shrink:0;margin-left:4px"></div>':''}
    </a>`;
  }).join('');
}
await loadDocs();
</script>
</body>
</html>
