<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script>
  // Prevent flash of wrong theme — must run before first paint
  (function(){try{var t=localStorage.getItem('theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)}catch(e){}})();
</script>
<title>Smart PDF Summarizer — Upload</title>
<meta name="description" content="Upload a lecture PDF and get AI-generated study materials."/>
<link rel="stylesheet" href="css/style.css?v=3"/>
<script type="importmap">
{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
</script>
</head>
<body>
<div class="control-bar" id="control-bar-target"></div>

<div class="wrap">
  <div class="top-bar">
    <a href="library.html" class="btn btn-ghost btn-sm">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span data-i18n="library">Library</span>
    </a>
    <div class="user-info">
      <span class="user-email" id="user-email"></span>
      <button class="btn btn-danger btn-xs" id="logout-btn" data-i18n="logOut">Log out</button>
    </div>
  </div>

  <header>
    <div class="logo logo-sm">Upload <span class="logo-accent">Lecture PDF</span></div>
    <p class="subtitle" data-i18n="uploadTagline">Drop a PDF and let AI turn it into study notes.</p>
  </header>

  <div class="card" id="upload-card">
    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <div style="flex:1;min-width:140px">
        <label class="provider-label" data-i18n="subjects">Subject</label>
        <select id="subject-select" style="width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:.88rem;outline:none;">
          <option value="" data-i18n="noSubject">No Subject</option>
        </select>
      </div>
      <div style="flex:1;min-width:140px">
        <label class="provider-label" data-i18n="outputLanguage">Output Language</label>
        <select id="language-select" style="width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:.88rem;outline:none;">
          <option value="english" data-i18n="langEnglish">English</option>
          <option value="myanmar" data-i18n="langMyanmar">Myanmar</option>
          <option value="chinese" data-i18n="langChinese">Chinese</option>
          <option value="japanese" data-i18n="langJapanese">Japanese</option>
          <option value="korean" data-i18n="langKorean">Korean</option>
          <option value="thai" data-i18n="langThai">Thai</option>
        </select>
      </div>
    </div>

    <span class="provider-label" data-i18n="aiProvider">AI Provider</span>
    <div class="provider-toggle">
      <button class="prov-btn active" id="btn-claude">
        <span class="prov-name">Claude</span>
        <span class="prov-sub">via custom proxy</span>
      </button>
      <button class="prov-btn" id="btn-gemini">
        <span class="prov-name">Gemini</span>
        <span class="prov-sub">gemini-1.5-flash</span>
      </button>
    </div>

    <div id="drop-zone" tabindex="0" role="button" aria-label="Upload PDF file">
      <div class="drop-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg></div>
      <div class="drop-title" data-i18n="dropTitle">Drop your lecture PDF here</div>
      <div class="drop-sub" data-i18n="dropSub">or click to browse — max 25 MB</div>
      <input type="file" id="file-input" accept=".pdf,application/pdf"/>
    </div>

    <div id="file-chip">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="fname" id="chip-name"></span>
      <span class="fsize" id="chip-size"></span>
      <button id="rm-file" title="Remove file" aria-label="Remove file">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="btn-row end submit-row">
      <button class="btn btn-accent" id="submit-btn" disabled data-i18n="analyzePDF">Analyze PDF</button>
    </div>
  </div>

  <div class="card" id="prog-section">
    <div class="prog-head"><span class="prog-name" id="prog-name"></span><span class="prog-pct" id="prog-pct">0%</span></div>
    <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
    <div class="prog-msg"><div class="spinner"></div><span id="prog-msg"></span></div>
  </div>

  <div id="err-box" role="alert" aria-live="polite"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span id="err-text"></span></div>

  <div id="results">
    <div class="res-head">
      <div class="res-title"><div class="dot-ok"></div><span data-i18n="analysisComplete">Analysis Complete</span> <span class="provider-badge" id="result-badge">Claude</span></div>
      <div class="res-actions">
        <a class="btn btn-ghost btn-sm" id="view-link" href="#"><span data-i18n="viewFullPage">View full page →</span></a>
        <button class="btn btn-ghost btn-sm" onclick="location.reload()" data-i18n="newPDF">New PDF</button>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="tabs">
      <button class="tab on" data-panel="summary"><span data-i18n="summary">Summary</span></button>
      <button class="tab" data-panel="keypoints"><span data-i18n="keyPoints">Key Points</span></button>
      <button class="tab" data-panel="flashcards"><span data-i18n="flashcards">Flashcards</span></button>
      <button class="tab" data-panel="quiz"><span data-i18n="quiz">Quiz</span></button>
      <button class="tab" data-panel="chat"><span data-i18n="askPDF">Ask</span></button>
    </div>
    <div class="panel on" id="p-summary"><div class="md" id="c-summary"></div></div>
    <div class="panel" id="p-keypoints"><div class="md" id="c-keypoints"></div></div>
    <div class="panel" id="p-flashcards">
      <p class="fc-hint-text" data-i18n="tapToFlip">Tap a card to reveal the answer</p>
      <div class="fc-grid" id="c-flashcards"></div>
    </div>
    <div class="panel" id="p-quiz">
      <div id="c-quiz"></div>
    </div>
    <div class="panel" id="p-chat">
      <div class="chat-container" id="c-chat"></div>
    </div>
  </div>
  <footer data-i18n="footer">Built with ❤️ · Powered by Supabase + AI</footer>
</div>

<script type="module">
import { sb } from './js/supabase-client.js';
import { t } from './js/i18n.js';
import { renderI18n, initTabs, switchTab } from './js/ui-init.js';
import { esc, md2html, fmtSize, parseFlashcards, renderFlashcards, parseQuiz, renderQuiz, downloadBlob } from './js/app.js';
import { toast } from './js/toast.js';
import { getSubjects } from './js/subjects.js';
import { renderChat, sendChatMessage, getChatHistory, appendMessage, showTypingIndicator, removeTypingIndicator } from './js/chat.js';
import { initPage } from './js/page-init.js';

const { user } = await initPage({
  onLangChange: () => { renderI18n(); document.getElementById('submit-btn').textContent = t('analyzePDF'); document.title = t('appName') + ' — ' + t('uploadTitle'); }
});

// Load subjects into dropdown
async function loadSubjects() {
  const subjects = await getSubjects();
  const sel = document.getElementById('subject-select');
  sel.innerHTML = `<option value="">${t('noSubject')}</option>`;
  subjects.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name;
    sel.appendChild(opt);
  });
}
loadSubjects();

document.getElementById('submit-btn').textContent = t('analyzePDF');
document.title = t('appName') + ' — ' + t('uploadTitle');

// State
const $ = id => document.getElementById(id);
let selFile = null, pollTimer = null, provider = 'claude', currentDocId = null, startTime = null;
let etaBuckets = []; // rolling window of {pct, elapsed} for smoothed ETA
let customFilename = ''; // user-editable filename

document.getElementById('btn-claude').addEventListener('click', () => { provider='claude'; updateProvUI(); });
document.getElementById('btn-gemini').addEventListener('click', () => { provider='gemini'; updateProvUI(); });
function updateProvUI() {
  $('btn-claude').className = 'prov-btn' + (provider==='claude'?' active':'');
  $('btn-gemini').className = 'prov-btn' + (provider==='gemini'?' active':'');
}
function checkBtn() { $('submit-btn').disabled = !selFile; }

const fileInput = $('file-input');
const dz = $('drop-zone');
dz.addEventListener('click', () => fileInput.click());
dz.addEventListener('keydown', e => (e.key==='Enter'||e.key===' ') && fileInput.click());
fileInput.addEventListener('change', () => fileInput.files[0] && setFile(fileInput.files[0]));
$('rm-file').addEventListener('click', async e => {
  e.stopPropagation();
  selFile=null; fileInput.value=''; $('file-chip').classList.remove('show'); checkBtn();
});
$('submit-btn').addEventListener('click', doUpload);

function setFile(f) {
  if (!f || !f.name.toLowerCase().endsWith('.pdf')) return toast(t('pleaseChoosePDF'), 'error');
  if (f.size > 25*1024*1024) return toast(t('fileTooLarge'), 'error');
  selFile = f;
  customFilename = f.name;
  renderChipName();
  $('chip-size').textContent = fmtSize(f.size);
  $('file-chip').classList.add('show'); checkBtn();
}

function renderChipName() {
  const chipName = $('chip-name');
  chipName.innerHTML = '';
  const display = document.createElement('span');
  display.className = 'fname-display';
  display.textContent = customFilename;
  display.title = 'Click to rename';
  display.style.cursor = 'text';
  display.addEventListener('click', startRename);
  chipName.appendChild(display);
}

function startRename() {
  const chipName = $('chip-name');
  chipName.innerHTML = '';
  const input = document.createElement('input');
  input.type = 'text';
  input.value = customFilename;
  input.className = 'fname-input';
  input.style.cssText = 'background:var(--bg);border:1px solid var(--gold);border-radius:var(--rs);padding:2px 6px;color:var(--text);font-family:var(--font-body);font-size:.88rem;width:100%;max-width:280px;outline:none;';
  chipName.appendChild(input);
  input.focus();
  input.select();
  const commit = () => {
    const v = input.value.trim();
    if (v && v.length > 0) {
      customFilename = v.endsWith('.pdf') ? v : v + '.pdf';
    }
    renderChipName();
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { input.blur(); }
    if (e.key === 'Escape') { renderChipName(); }
  });
}

dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); e.dataTransfer.files[0] && setFile(e.dataTransfer.files[0]); });

function showErr(msg) { $('err-box').classList.add('show'); $('err-text').textContent = msg; }
function hideErr() { $('err-box').classList.remove('show'); }

async function doUpload() {
  if (!selFile) return;
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  const docId = (typeof crypto !== 'undefined' && crypto.randomUUID)
    ? crypto.randomUUID()
    : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
  currentDocId = docId;
  const uid = user.id, pdfPath = `${uid}/${docId}.pdf`;
  startTime = Date.now();
  etaBuckets = [];
  hideErr(); $('upload-card').style.display='none'; $('results').classList.remove('show');
  $('prog-section').classList.add('show'); $('prog-name').textContent = customFilename || selFile.name;
  updateProgress(0, t('uploadingPDF'));
  try {
    const { error: upErr } = await sb.storage.from('pdfs').upload(pdfPath, selFile);
    if (upErr) throw new Error(upErr.message);
    updateProgress(15, t('startingAI'));
    const language = document.getElementById('language-select').value || 'english';
    const subjectId = document.getElementById('subject-select').value || null;
    const { error: fnErr } = await sb.functions.invoke('process-pdf', { body: { doc_id: docId, pdf_path: `pdfs/${pdfPath}`, provider, custom_filename: customFilename, language } });
    // Update subject_id after document is created
    if (subjectId && !fnErr) {
      await sb.from('documents').update({ subject_id: subjectId }).eq('id', docId);
    }
    if (fnErr) throw new Error(fnErr.message);
    startPoll(docId, uid);
  } catch (err) { showErr(err.message); $('upload-card').style.display=''; $('prog-section').classList.remove('show'); }
}
function updateProgress(pct, msg) {
  $('prog-pct').textContent = pct+'%';
  $('bar').style.width = pct+'%';
  let displayMsg = msg;

  if (startTime && pct >= 35 && pct < 100) {
    const elapsed = (Date.now() - startTime) / 1000;
    etaBuckets.push({ pct, elapsed });
    // Keep only last 5 readings for a rolling average
    if (etaBuckets.length > 5) etaBuckets.shift();

    // Use the oldest and newest bucket to compute rate (more stable)
    const first = etaBuckets[0];
    const last = etaBuckets[etaBuckets.length - 1];
    const dpct = last.pct - first.pct;
    const dtime = last.elapsed - first.elapsed;

    if (dpct > 0 && dtime > 0) {
      // Linear extrapolation from rolling rate
      const rate = dpct / dtime; // % per second
      const remainingPct = 100 - pct;
      const etaSec = Math.round(remainingPct / rate);

      if (etaSec > 0 && etaSec < 600) {
        const etaStr = etaSec < 60
          ? '~' + etaSec + 's left'
          : '~' + Math.round(etaSec / 60) + ' min left';
        displayMsg = msg + ' · ' + etaStr;
      }
    }
  }
  $('prog-msg').textContent = displayMsg;
}

function startPoll(docId, uid) {
  let failCount = 0;
  pollTimer = setInterval(async () => {
    try {
      const { data: doc } = await sb.from('documents').select('*').eq('id', docId).single();
      if (!doc) return;
      failCount = 0;
      updateProgress(doc.progress, doc.progress_msg);
      if (doc.status === 'done') { clearInterval(pollTimer); showResults(doc, uid); }
      if (doc.status === 'error') { clearInterval(pollTimer); showErr(doc.error_msg || t('somethingWentWrong')); $('upload-card').style.display=''; $('prog-section').classList.remove('show'); }
    } catch (pollErr) {
      console.error('Poll failed:', pollErr);
      failCount++;
      if (failCount >= 3) {
        clearInterval(pollTimer);
        showErr(t('networkError'));
        $('upload-card').style.display = '';
        $('prog-section').classList.remove('show');
      }
    }
  }, 1500);
}

async function showResults(doc, uid) {
  $('prog-section').classList.remove('show'); $('upload-card').style.display='';
  $('result-badge').textContent = doc.provider==='gemini'?'Gemini':'Claude';
  let st = '';
  if (doc.page_count) st += `<div class="stat">${t('pages')}: <strong>${doc.page_count}</strong></div>`;
  if (doc.word_count) st += `<div class="stat">${t('words')}: <strong>${doc.word_count.toLocaleString()}</strong></div>`;
  if (doc.flashcard_count) st += `<div class="stat">${t('flashcards')}: <strong>${doc.flashcard_count}</strong></div>`;
  if (doc.quiz_count) st += `<div class="stat">${t('quiz')}: <strong>${doc.quiz_count}</strong></div>`;
  $('stats').innerHTML = st;
  $('view-link').href = `view.html?id=${currentDocId}`;

  const prefix = `${uid}/${currentDocId}/`;
  const baseName = doc.filename.replace(/\.pdf$/i, '');
  let downloadFailed = false;
  // Track raw content for download buttons
  let rawSummary = '', rawKeyPoints = '', rawFlashcards = '', rawQuiz = '';
  try {
    const [sRes,kRes,fRes,qRes] = await Promise.all([
      sb.storage.from('outputs').download(prefix+'summary.md'),
      sb.storage.from('outputs').download(prefix+'key_points.md'),
      sb.storage.from('outputs').download(prefix+'flashcards.md'),
      sb.storage.from('outputs').download(prefix+'quiz.md'),
    ]);

    if (sRes.data) {
      rawSummary = await sRes.data.text();
      $('c-summary').innerHTML = md2html(rawSummary.replace(/^# .*\n/,'').replace(/---[\s\S]*$/,''));
    } else if (sRes.error) {
      console.error('Failed to load summary:', sRes.error);
      downloadFailed = true;
    }
    if (kRes.data) {
      rawKeyPoints = await kRes.data.text();
      $('c-keypoints').innerHTML = md2html(rawKeyPoints.replace(/^# .*\n/,'').replace(/---[\s\S]*$/,''));
    } else if (kRes.error) {
      console.error('Failed to load key points:', kRes.error);
      downloadFailed = true;
    }
    if (fRes.data) {
      rawFlashcards = await fRes.data.text();
      const cards = parseFlashcards(rawFlashcards);
      renderFlashcards($('c-flashcards'), cards, t);
    } else if (fRes.error) {
      console.error('Failed to load flashcards:', fRes.error);
      downloadFailed = true;
    }
    if (qRes.data) {
      rawQuiz = await qRes.data.text();
      const quizQuestions = parseQuiz(rawQuiz);
      renderQuiz($('c-quiz'), quizQuestions, t);
    } else if (qRes.error) {
      // Quiz is optional, don't mark as failed
      console.log('No quiz available');
    }
  } catch (downErr) {
    downloadFailed = true;
    console.error('Failed to download output files:', downErr);
  }

  // Add download buttons to each panel
  addDownloadButtons(rawSummary, rawKeyPoints, rawFlashcards, rawQuiz, baseName);

  // Initialize chat
  initChat(currentDocId);

  if (downloadFailed) {
    toast(t('networkError'), 'error');
  }
  $('results').classList.add('show'); $('results').scrollIntoView({ behavior:'smooth',block:'start' });
}

function addDownloadButtons(rawSummary, rawKeyPoints, rawFlashcards, rawQuiz, baseName) {
  const tabs = [
    { panel: 'summary', content: rawSummary, suffix: '_summary.md' },
    { panel: 'keypoints', content: rawKeyPoints, suffix: '_key_points.md' },
    { panel: 'flashcards', content: rawFlashcards, suffix: '_flashcards.md' },
    { panel: 'quiz', content: rawQuiz, suffix: '_quiz.md' },
  ];
  tabs.forEach(({ panel, content, suffix }) => {
    const el = document.getElementById('p-' + panel);
    if (!el) return;
    const existing = el.querySelector('.panel-download');
    if (existing) existing.remove();
    const wrapper = document.createElement('div');
    wrapper.className = 'panel-download';
    wrapper.innerHTML = '<button class="btn btn-ghost btn-xs dl-tab-btn">Download .md</button>';
    wrapper.querySelector('.dl-tab-btn').addEventListener('click', () => {
      if (content) downloadBlob(content, baseName + suffix);
    });
    el.insertBefore(wrapper, el.firstChild);
  });

  // Download All button
  const resActions = document.querySelector('#results .res-actions');
  if (resActions && !resActions.querySelector('.dl-all-btn')) {
    const dlAll = document.createElement('button');
    dlAll.className = 'btn btn-accent btn-sm dl-all-btn';
    dlAll.textContent = 'Download All';
    dlAll.addEventListener('click', () => {
      if (rawSummary) { downloadBlob(rawSummary, baseName + '_summary.md'); }
      setTimeout(() => { if (rawKeyPoints) downloadBlob(rawKeyPoints, baseName + '_key_points.md'); }, 300);
      setTimeout(() => { if (rawFlashcards) downloadBlob(rawFlashcards, baseName + '_flashcards.md'); }, 600);
      setTimeout(() => { if (rawQuiz) downloadBlob(rawQuiz, baseName + '_quiz.md'); }, 900);
    });
    resActions.appendChild(dlAll);
  }
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab));
});
initTabs();

// Chat initialization
async function initChat(docId) {
  const container = $('c-chat');
  const history = await getChatHistory(docId);
  renderChat(container, history, async (msg) => {
    appendMessage(container, 'user', msg);
    const typingEl = showTypingIndicator(container);
    const sendBtn = container.querySelector('.chat-send-btn');
    const input = container.querySelector('.chat-input');
    if (sendBtn) sendBtn.disabled = true;
    if (input) input.disabled = true;

    const { data, error } = await sendChatMessage(docId, msg);
    removeTypingIndicator(container);

    if (error) {
      appendMessage(container, 'assistant', 'Sorry, something went wrong. Please try again.');
    } else {
      appendMessage(container, 'assistant', data?.response || 'No response received.');
    }

    if (sendBtn) sendBtn.disabled = false;
    if (input) { input.disabled = false; input.focus(); }
  });
}
</script>
</body>
</html>
