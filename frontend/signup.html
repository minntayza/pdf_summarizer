<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script>
  // Prevent flash of wrong theme — must run before first paint
  (function(){try{var t=localStorage.getItem('theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)}catch(e){}})();
</script>
<title>Smart PDF Summarizer — Sign Up</title>
<meta name="description" content="Create an account on Smart PDF Lecture Summarizer."/>
<link rel="stylesheet" href="css/style.css?v=3"/>
<script type="importmap">
{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
</script>
</head>
<body>
<div class="control-bar" id="control-bar-target"></div>

<div class="wrap">
  <header>
    <div class="logo">Smart <span class="logo-accent">PDF</span> Summarizer</div>
    <p class="subtitle" data-i18n="signupTagline">Start turning your lecture PDFs into study materials.</p>
  </header>

  <div class="card">
    <form id="signup-form" autocomplete="on" novalidate>
      <div class="field">
        <label for="email" data-i18n="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" data-i18n-placeholder="emailPlaceholder" required/>
      </div>
      <div class="field">
        <label for="password" data-i18n="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" autocomplete="new-password" data-i18n-placeholder="passwordPlaceholder" minlength="8" required/>
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <p class="field-hint" data-i18n="passwordHint">Minimum 8 characters</p>
      </div>
      <div class="field">
        <label for="confirm" data-i18n="confirmPassword">Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="confirm" name="confirm" autocomplete="new-password" data-i18n-placeholder="confirmPasswordPlaceholder" minlength="8" required/>
          <button type="button" class="pw-toggle" id="confirm-toggle" aria-label="Show confirm password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div id="form-error" class="field-error field-error-gap" aria-live="polite"></div>
      <button type="submit" class="btn btn-accent btn-full" id="submit-btn" data-i18n="createAccount">Create Account</button>
    </form>
  </div>
  <p class="auth-switch"><span data-i18n="alreadyHaveAccount">Already have an account?</span> <a href="index.html" class="link" data-i18n="logInLink">Log in</a></p>
  <footer data-i18n="footer">Built with ❤️ · Powered by Supabase + AI</footer>
</div>

<script type="module">
import { sb } from './js/supabase-client.js';
import { t } from './js/i18n.js';
import { initUI, renderI18n } from './js/ui-init.js';
import { injectControlBar } from './js/shared-ui.js';
import { toast } from './js/toast.js';
injectControlBar();

let session;
try {
  const sessResp = await sb.auth.getSession();
  session = sessResp.data?.session;
} catch (err) {
  console.error('Auth check failed:', err);
  session = null;
}
if (session) window.location.href = 'upload.html';

// Theme, font size, language — shared init
function renderAll() {
  renderI18n();
  document.getElementById('submit-btn').textContent = t('createAccount');
  document.title = t('appName') + ' — ' + t('signupTitle');
}
initUI(renderAll);
renderAll();

// Password toggles
function setupToggle(bid, iid) {
  const b = document.getElementById(bid), i = document.getElementById(iid);
  b.addEventListener('click', () => {
    const isPw = i.type === 'password'; i.type = isPw ? 'text' : 'password';
    b.innerHTML = isPw ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><line x1="1" y1="1" x2="23" y2="23"/></svg>' : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  });
}
setupToggle('pw-toggle','password'); setupToggle('confirm-toggle','confirm');

// Form
const form = document.getElementById('signup-form'), emailInput = document.getElementById('email');
const pwInput = document.getElementById('password'), confirmInput = document.getElementById('confirm');
const submitBtn = document.getElementById('submit-btn'), formErr = document.getElementById('form-error');

form.addEventListener('submit', async (e) => {
  e.preventDefault(); formErr.classList.remove('show');
  const email = emailInput.value.trim(), pw = pwInput.value, cf = confirmInput.value;
  if (!email) { formErr.textContent = t('pleaseEnterEmail'); formErr.classList.add('show'); return; }
  if (pw.length < 8) { formErr.textContent = t('passwordTooShort'); formErr.classList.add('show'); return; }
  if (pw !== cf) { formErr.textContent = t('passwordsNoMatch'); formErr.classList.add('show'); return; }
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<div class="spinner"></div> ' + t('creatingAccount');
  try {
    const { error } = await sb.auth.signUp({ email, password: pw });
    if (error) throw error;
    toast(t('accountCreated'), 'success');
    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
  } catch (err) {
    formErr.textContent = err.message || t('signUpFailed');
    formErr.classList.add('show'); submitBtn.disabled = false;
    submitBtn.textContent = t('createAccount');
  }
});
</script>
</body>
</html>
